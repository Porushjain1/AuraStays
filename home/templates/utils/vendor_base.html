<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vendor Dashboard - Aura Stays</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Custom CSS -->
    <link href="/static/css/style.css?v=2" rel="stylesheet">

    <!-- Froala Editor -->
    <link href='https://cdn.jsdelivr.net/npm/froala-editor@latest/css/froala_editor.pkgd.min.css' rel='stylesheet' type='text/css' />
    <script type='text/javascript' src='https://cdn.jsdelivr.net/npm/froala-editor@latest/js/froala_editor.pkgd.min.js'></script>  
</head>
<body>
    
    <div class="vendor-wrapper fade-up-element visible">
        <!-- Sidebar -->
        <aside class="vendor-sidebar">
            <div class="sidebar-header d-flex align-items-center">
                <i class="fa-solid fa-hotel text-danger me-2 fs-4"></i>
                <span class="fs-4 fw-bold" style="letter-spacing: -0.5px;">Aura <span class="text-danger">Host</span></span>
            </div>
            
            <nav class="sidebar-nav">
                <p class="text-muted small text-uppercase fw-bold px-3 mb-2">Menu</p>
                <a href="{% url 'dashboard' %}" class="sidebar-link {% if request.path == '/accounts/dashboard/' %}active{% endif %}">
                    <i class="fa-solid fa-chart-line"></i> Dashboard
                </a>
                <a href="{% url 'vendor_hotels' %}" class="sidebar-link {% if '/accounts/vendor-hotels/' in request.path %}active{% endif %}">
                    <i class="fa-solid fa-building"></i> My Hotels
                </a>
                <a href="{% url 'add_hotel' %}" class="sidebar-link {% if request.path == '/accounts/add-hotel/' %}active{% endif %}">
                    <i class="fa-solid fa-plus-circle"></i> Add Hotel
                </a>
                <a href="{% url 'vendor_bookings' %}" class="sidebar-link {% if request.path == '/accounts/vendor-bookings/' %}active{% endif %}">
                    <i class="fa-solid fa-calendar-check"></i> Bookings
                </a>
                
                <hr class="opacity-25 my-4 mx-3">
                
                <p class="text-muted small text-uppercase fw-bold px-3 mb-2">Account</p>
                <a href="/" class="sidebar-link">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i> View Website
                </a>
                <a href="{% url 'logout_view' %}" class="sidebar-link text-danger">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </a>
            </nav>
            
            <div class="p-4 mt-auto">
                <div class="d-flex align-items-center gap-3">
                    <div class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center fw-bold" style="width: 40px; height: 40px;">
                        {{ request.user.first_name|slice:":1" }}{{ request.user.last_name|slice:":1" }}
                    </div>
                    <div>
                        <div class="fw-bold fs-6">{{ request.user.first_name }}</div>
                        <div class="text-muted small">Vendor</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="vendor-main">
            {% include "utils/alerts.html" %}
            {% block start %}
            {% endblock %}
        </main>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>

{% extends "utils/base.html" %}

{% block start %}
<div class="auth-bg fade-up-element visible">
    <div class="auth-card text-center">
        <div class="mb-4">
            <i class="fa-solid fa-shield-halved text-danger fa-3x mb-3"></i>
            <h3 class="fw-bold text-dark">Verify Your Account</h3>
            <p class="text-muted small">We've sent a One-Time Password to your email.</p>
        </div>

        <form method="post">
            {% include "utils/alerts.html" %}
            {% csrf_token %}
            
            <div class="mb-4 text-start">
                <label for="otpInput" class="form-label text-muted small text-uppercase">Enter OTP</label>
                <input type="text" name="otp" class="form-control form-control-lg text-center fw-bold fs-4 tracking-widest" id="otpInput" placeholder="• • • •" autocomplete="off" required maxlength="4" style="letter-spacing: 0.5rem;">
            </div>
            
            <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-3 fs-5">
                <i class="fa-solid fa-circle-check me-2"></i>Verify OTP
            </button>
            
            <p class="text-muted small">Didn't receive the code? <a href="#" class="text-danger text-decoration-none fw-bold">Resend OTP</a></p>
        </form>
    </div>
</div>
{% endblock %}

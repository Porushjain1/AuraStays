{% extends "utils/base.html" %}

{% block start %}

<div class="auth-bg w-100">
    <div class="auth-card mx-auto">
        <h2 class="text-center fw-bold mb-4">Vendor Login</h2>
        <form method="post">
            {% include "utils/alerts.html" %}
            {% csrf_token %}
            <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label">Email address</label>
                <input id="email" type="email" name="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
            </div>

            <div class="mb-4">
                <label for="exampleInputPassword1" class="form-label">Password</label>
                <input type="password" name="password" class="form-control" id="exampleInputPassword1">
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 mb-3">Login as Vendor</button>
            <div class="text-center">
                <p class="text-muted mb-2">Or login via email</p>
                <button type="button" class="btn btn-outline-secondary w-100 rounded-pill" onclick="sendOtp()">Login With OTP</button>
            </div>
            
            <div class="text-center mt-4">
                <p class="text-muted mb-0">Don't have a vendor account? <a href="{% url 'register_vendor' %}" class="fw-bold text-danger">Sign up</a></p>
            </div>
        </form>
    </div>
</div>

    <script>
        function sendOtp(){
        var email = document.getElementById('email').value;
        if(email== ""){
        alert("Email cannot be blank");
        return;
    }
    window.location.href = `/accounts/send_otp/${encodeURIComponent(email)}/?type=vendor`;
        }



    </script>


{% endblock %}
